<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="img/icon.png" />
    <link rel="stylesheet" href="styles/styles-password.css" />
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <title>change-password</title>
  </head>
  <body>
    <div id="content-div">
      <img src="img/d-d-icon.png" id="image-change" />
      <form id="change-password-form">
        <input
          type="text"
          id="old-password"
          class="change-text"
          placeholder="Please enter the current password "
          required
        />
        <input
          id="new-password"
          class="change-text"
          type="password"
          required
          placeholder="Please enter the new password"
          pattern="^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&]).+$"
          title="Min 8 chars, letters, numbers and one special character"
          minlength="8"
        />
        <input
          type="password"
          class="change-text"
          id="new-password-confirm"
          placeholder="Please confirm the new password"
          required
        />
        <div id="button-container">
          <button class="buttons" id="accept-change">Accept</button>
          <button class="buttons" id="cancel-change">Cancel</button>
        </div>
        <p id="error-message"></p>
      </form>
    </div>
  </body>
  <script src="scripts/changePassword.js"></script>
</html>
